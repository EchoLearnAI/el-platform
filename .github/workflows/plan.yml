name: Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  plan:
    name: Plan — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - management-groups
          - management
          - connectivity
          - identity
        include:
          - module: connectivity
            extra_env: ARM_CONNECTIVITY_SUBSCRIPTION_ID

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Terraform Init
        working-directory: terraform/${{ matrix.module }}
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/${{ matrix.module }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/${{ matrix.module }}
        env:
          TF_VAR_management_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_connectivity_subscription_id: ${{ secrets.AZURE_CONNECTIVITY_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform plan -var-file="terraform.tfvars.example" -no-color -out=tfplan

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const module = '${{ matrix.module }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — \`${module}\`\nSee workflow run for full output.`
            });
