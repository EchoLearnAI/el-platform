name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Apply — management-groups
        working-directory: terraform/management-groups
        env:
          TF_VAR_management_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_connectivity_subscription_id: ${{ secrets.AZURE_CONNECTIVITY_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          terraform init
          terraform apply -var-file="terraform.tfvars.example" -auto-approve

      - name: Apply — management
        working-directory: terraform/management
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init
          terraform apply -var-file="terraform.tfvars.example" -auto-approve

      - name: Apply — connectivity
        working-directory: terraform/connectivity
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_CONNECTIVITY_SUBSCRIPTION_ID }}
        run: |
          terraform init
          terraform apply -var-file="terraform.tfvars.example" -auto-approve

      - name: Apply — identity
        working-directory: terraform/identity
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init
          terraform apply -var-file="terraform.tfvars.example" -auto-approve
